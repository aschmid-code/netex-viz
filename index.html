<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeTEx Visualizer CH</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    /* ── Theme tokens ── */
    :root {
      --bg:#f5f6fa; --bg2:#ffffff; --bg3:#eef0f7; --border:#d0d4e8;
      --text:#1a1d2e; --muted:#5c6380; --accent:#5c6bc0; --accent2:#1976d2;
      --amber:#e65100; --red:#c62828; --green:#2e7d32;
      --map-tile: 'light';
    }
    [data-theme="dark"] {
      --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2d3250;
      --text:#e8eaf6; --muted:#7986cb; --accent:#5c6bc0; --accent2:#42a5f5;
      --amber:#ffa726; --red:#ef5350; --green:#66bb6a;
    }

    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:14px; height:100vh; display:flex; flex-direction:column; overflow:hidden; transition:background .2s,color .2s; }

    /* ── Header ── */
    header { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 16px; height:52px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .logo { font-size:15px; font-weight:600; display:flex; align-items:center; gap:8px; white-space:nowrap; }
    .badge { background:var(--accent); color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:500; }
    .btn { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:6px 11px; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap; }
    .btn:hover { border-color:var(--accent); }
    .theme-btn { font-size:16px; padding:4px 8px; line-height:1; }
    #status { margin-left:auto; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px; }
    #file-input { display:none; }
    .sample-select { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:13px; cursor:pointer; max-width:240px; }

    /* ── Layout ── */
    .app { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:265px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* ── Sidebar ── */
    .sb-section { padding:11px 14px 8px; border-bottom:1px solid var(--border); }
    .sb-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:6px; }
    .stat-row { display:flex; justify-content:space-between; padding:3px 0; }
    .stat-label { color:var(--muted); font-size:12px; }
    .stat-val { font-weight:600; font-size:13px; }
    .journey-list { overflow-y:auto; flex:1; }
    .ji { padding:9px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
    .ji:hover, .ji.active { background:var(--bg3); }
    .ji-name { font-size:13px; font-weight:500; }
    .ji-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .mode-pill { display:inline-block; font-size:10px; padding:1px 5px; border-radius:3px; font-weight:600; margin-right:4px; }
    .m-rail  { background:rgba(92,107,192,.2);  color:#5c6bc0; }
    .m-bus   { background:rgba(25,118,210,.15); color:#1976d2; }
    .m-other { background:rgba(46,125,50,.15);  color:#2e7d32; }
    [data-theme="dark"] .m-rail  { background:rgba(92,107,192,.3);  color:#9fa8da; }
    [data-theme="dark"] .m-bus   { background:rgba(66,165,245,.25); color:#90caf9; }
    [data-theme="dark"] .m-other { background:rgba(102,187,106,.2); color:#a5d6a7; }

    /* ── Tabs ── */
    .tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
    .tab { padding:10px 18px; font-size:13px; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); }
    .tab.active { color:var(--text); border-bottom-color:var(--accent2); }
    .tab:hover { color:var(--text); }

    /* ── Map ── */
    #map { flex:1; }
    .map-wrap { flex:1; display:flex; flex-direction:column; position:relative; }
    .map-wrap.hidden { display:none; }
    .leaflet-popup-content-wrapper { background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); }
    .leaflet-popup-tip { background:var(--bg2); }
    .leaflet-popup-content { font-size:13px; }

    /* ── Marey ── */
    .marey-wrap { flex:1; overflow:auto; display:flex; flex-direction:column; }
    .marey-wrap.hidden { display:none; }
    #marey-container { flex:1; padding:16px; }

    /* ── Detail ── */
    .detail-wrap { flex:1; overflow-y:auto; padding:20px; }
    .detail-wrap.hidden { display:none; }
    .detail-table { width:100%; border-collapse:collapse; margin-top:8px; }
    .detail-table th { text-align:left; padding:6px 10px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); border-bottom:1px solid var(--border); }
    .detail-table td { padding:7px 10px; font-size:13px; border-bottom:1px solid var(--border); }
    .detail-table tr:hover td { background:var(--bg3); }
    .mono { font-family:monospace; font-size:12px; }
    .sh { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:16px 0 6px; }


    /* ── Validation badge ── */
    .val-badge { display:none; align-items:center; gap:6px; padding:5px 10px; border-radius:6px; font-size:12px; font-weight:600; cursor:default; border:1px solid transparent; white-space:nowrap; }
    .val-badge.show { display:flex; }
    .val-badge.valid   { background:rgba(46,125,50,.12); border-color:rgba(46,125,50,.4); color:#2e7d32; }
    .val-badge.invalid { background:rgba(198,40,40,.1);  border-color:rgba(198,40,40,.4); color:#c62828; cursor:pointer; }
    .val-badge.loading { background:rgba(92,107,192,.1); border-color:rgba(92,107,192,.3); color:var(--muted); cursor:wait; }
    [data-theme="dark"] .val-badge.valid   { background:rgba(102,187,106,.15); border-color:rgba(102,187,106,.4); color:#66bb6a; }
    [data-theme="dark"] .val-badge.invalid { background:rgba(239,83,80,.12);   border-color:rgba(239,83,80,.4);   color:#ef5350; }
    [data-theme="dark"] .val-badge.loading { background:rgba(92,107,192,.15);  border-color:rgba(92,107,192,.3);  color:var(--muted); }

    /* ── Validation modal ── */
    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:10000; align-items:flex-start; justify-content:center; padding-top:60px; }
    .modal-backdrop.show { display:flex; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:10px; width:min(760px,95vw); max-height:75vh; display:flex; flex-direction:column; box-shadow:0 16px 48px rgba(0,0,0,.3); }
    .modal-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .modal-title { font-size:14px; font-weight:600; }
    .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:2px 6px; border-radius:4px; }
    .modal-close:hover { color:var(--text); background:var(--bg3); }
    .modal-body { overflow-y:auto; padding:16px 20px; flex:1; }
    .err-row { padding:10px 12px; border-radius:6px; margin-bottom:8px; font-size:12px; background:rgba(198,40,40,.07); border-left:3px solid #c62828; }
    [data-theme="dark"] .err-row { background:rgba(239,83,80,.08); border-left-color:#ef5350; }
    .err-loc  { font-family:monospace; font-size:11px; color:var(--muted); margin-bottom:3px; }
    .err-msg  { color:var(--text); line-height:1.5; }
    .val-summary { padding:10px 12px; border-radius:6px; margin-bottom:14px; font-size:13px; }
    .val-summary.ok  { background:rgba(46,125,50,.1);  color:#2e7d32; }
    .val-summary.err { background:rgba(198,40,40,.1);  color:#c62828; }
    [data-theme="dark"] .val-summary.ok  { background:rgba(102,187,106,.12); color:#66bb6a; }
    [data-theme="dark"] .val-summary.err { background:rgba(239,83,80,.1);    color:#ef5350; }

    /* ── Quality panel ── */
    .qa-tab-badge { display:inline-block; min-width:16px; height:16px; line-height:16px; text-align:center; border-radius:8px; font-size:10px; font-weight:700; margin-left:2px; padding:0 4px; }
    .qa-tab-badge.err  { background:#c62828; color:#fff; }
    .qa-tab-badge.warn { background:#e65100; color:#fff; }
    .qa-tab-badge.ok   { background:#2e7d32; color:#fff; }
    .qa-tab-badge.empty { display:none; }
    .qa-summary { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .qa-card { flex:1; min-width:120px; padding:14px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg2); }
    .qa-card-num { font-size:28px; font-weight:700; line-height:1; }
    .qa-card-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:6px; }
    .qa-card.err  .qa-card-num { color:#c62828; }
    .qa-card.warn .qa-card-num { color:#e65100; }
    .qa-card.ok   .qa-card-num { color:#2e7d32; }
    [data-theme="dark"] .qa-card.err  .qa-card-num { color:#ef5350; }
    [data-theme="dark"] .qa-card.warn .qa-card-num { color:#ffa726; }
    [data-theme="dark"] .qa-card.ok   .qa-card-num { color:#66bb6a; }
    .qa-group { margin-bottom:8px; }
    .qa-item { padding:10px 12px; border-radius:6px; margin-bottom:6px; font-size:12px; display:flex; gap:10px; align-items:flex-start; }
    .qa-item.err  { background:rgba(198,40,40,.07);  border-left:3px solid #c62828; }
    .qa-item.warn { background:rgba(230,81,0,.07);   border-left:3px solid #e65100; }
    .qa-item.info { background:rgba(25,118,210,.06); border-left:3px solid #1976d2; }
    [data-theme="dark"] .qa-item.err  { background:rgba(239,83,80,.08); border-left-color:#ef5350; }
    [data-theme="dark"] .qa-item.warn { background:rgba(255,167,38,.08); border-left-color:#ffa726; }
    [data-theme="dark"] .qa-item.info { background:rgba(66,165,245,.08); border-left-color:#42a5f5; }
    .qa-icon { font-size:14px; flex-shrink:0; }
    .qa-body { flex:1; }
    .qa-msg { color:var(--text); line-height:1.5; }
    .qa-ctx { font-family:monospace; font-size:11px; color:var(--muted); margin-top:3px; }
    .qa-check-ok { padding:10px 12px; border-radius:6px; margin-bottom:6px; font-size:12px; background:rgba(46,125,50,.07); border-left:3px solid #2e7d32; color:var(--muted); display:flex; gap:10px; align-items:center; }
    [data-theme="dark"] .qa-check-ok { background:rgba(102,187,106,.07); border-left-color:#66bb6a; }

    /* ── Drop overlay ── */
    .drop-overlay { display:none; position:fixed; inset:0; background:rgba(92,107,192,.12); border:2px dashed var(--accent); z-index:9999; align-items:center; justify-content:center; font-size:20px; color:var(--accent); backdrop-filter:blur(2px); }
    .drop-overlay.active { display:flex; }

    /* ── Empty ── */
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--muted); gap:8px; font-size:13px; }
  </style>
</head>
<body>

<div class="drop-overlay" id="drop-overlay">XML-Datei hier ablegen ↓</div>

<header>
  <div class="logo"><span class="badge">NeTEx</span> Visualizer CH</div>
  <select class="sample-select" id="sample-select" onchange="loadSample(this.value)">
    <option value="">— Beispiel laden —</option>
    <option value="sample-data/NeTEx_Spiez_Interlaken_Ost_PassingTime.xml">Spiez → Interlaken Ost</option>
    <option value="sample-data/NeEX_CH_Bern_Olten_ZuerichHB_Winterthur_StGallen_with_Facilities.xml">Bern → St. Gallen</option>
  </select>
  <button class="btn" onclick="document.getElementById('file-input').click()">⬆ Eigene XML</button>
  <input type="file" id="file-input" accept=".xml" onchange="loadLocalFile(this)">
  <div id="val-badge" class="val-badge" onclick="showValidationModal()">
    <span id="val-icon"></span><span id="val-text"></span>
  </div>
  <button class="btn theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Hell/Dunkel umschalten">☀️</button>
  <span id="status">Datei laden oder Beispiel wählen</span>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">Übersicht</div>
      <div class="stat-row"><span class="stat-label">Haltestellen</span><span class="stat-val" id="s-stops">—</span></div>
      <div class="stat-row"><span class="stat-label">Linien</span><span class="stat-val" id="s-lines">—</span></div>
      <div class="stat-row"><span class="stat-label">Fahrten</span><span class="stat-val" id="s-journeys">—</span></div>
    </div>
    <div class="sb-section"><div class="sb-title">Fahrten</div></div>
    <div class="journey-list" id="journey-list">
      <div class="empty" style="padding:32px 0">Keine Daten</div>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="showTab('map')">🗺 Karte</div>
      <div class="tab" onclick="showTab('marey')">📊 Fahrplan</div>
      <div class="tab" onclick="showTab('detail')">📋 Details</div>
      <div class="tab" onclick="showTab('quality')">🔍 Prüfung <span id="qa-tab-badge" class="qa-tab-badge"></span></div>
    </div>
    <div class="map-wrap" id="tab-map"><div id="map"></div></div>
    <div class="marey-wrap hidden" id="tab-marey"><div id="marey-container"><div class="empty">Datei laden</div></div></div>
    <div class="detail-wrap hidden" id="tab-detail"><div class="empty">Fahrt in der Liste wählen</div></div>
    <div class="detail-wrap hidden" id="tab-quality"><div class="empty">Datei laden für Datenprüfung</div></div>
  </div>
</div>

<!-- Validation Modal -->
<div class="modal-backdrop" id="val-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">XSD-Validierung</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  Theme
// ════════════════════════════════════════════════════════
let darkMode = false;
function toggleTheme() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
  document.getElementById('theme-toggle').textContent = darkMode ? '🌙' : '☀️';
  updateMapTiles();
}

// ════════════════════════════════════════════════════════
//  NeTEx XML Parser
// ════════════════════════════════════════════════════════
const NX = 'http://www.netex.org.uk/netex';
function nx(el, tag)      { return [...el.getElementsByTagNameNS(NX, tag)]; }
function nxFirst(el, tag) { return el.getElementsByTagNameNS(NX, tag)[0] || null; }
function txt(el, tag)     { const f = nxFirst(el, tag); return f ? f.textContent.trim() : null; }

function parseNeTEx(xmlString) {
  const doc = new DOMParser().parseFromString(xmlString, 'application/xml');
  const err = doc.querySelector('parsererror');
  if (err) throw new Error('XML-Fehler: ' + err.textContent.slice(0,200));

  const stops    = parseStops(doc);
  const lines    = parseLines(doc);
  const journeys = parseJourneys(doc, stops);
  return { stops, lines, journeys };
}

// Numeric suffix extractor: ch:1:SchedStopPoint:7000 -> "7000"
function numericSuffix(id) {
  const m = id.match(/:(\d+)(?:[:_-]|$)/);
  return m ? m[1] : null;
}

function parseStops(doc) {
  const stops = {};

  nx(doc, 'StopPlace').forEach(sp => {
    const id  = sp.getAttribute('id');
    const lat = parseFloat(txt(sp,'Latitude'))  || null;
    const lon = parseFloat(txt(sp,'Longitude')) || null;
    const alt = parseFloat(txt(sp,'Altitude'))  || null;
    const nameEl = nxFirst(sp,'Name') || nxFirst(sp,'Text');
    stops[id] = { id, name: nameEl?.textContent.trim() || id, lat, lon, alt, type:'StopPlace' };
  });

  // Index StopPlaces by numeric suffix for fallback matching
  const stopsBySuffix = {};
  Object.values(stops).forEach(sp => {
    const s = numericSuffix(sp.id);
    if (s) stopsBySuffix[s] = sp;
  });

  nx(doc, 'ScheduledStopPoint').forEach(ssp => {
    const id   = ssp.getAttribute('id');
    const name = txt(ssp,'Name') || id;
    let   lat  = parseFloat(txt(ssp,'Latitude'))  || null;
    let   lon  = parseFloat(txt(ssp,'Longitude')) || null;

    if (!lat || !lon) {
      // Fallback 1: StopPlace-ID ist Präfix der SSP-ID (ch:1:sloid:95598 -> ch:1:sloid:95598:0:2)
      const prefixMatch = Object.values(stops).find(sp =>
        id.startsWith(sp.id + ':') || id.startsWith(sp.id + '-')
      );
      if (prefixMatch) { lat = prefixMatch.lat; lon = prefixMatch.lon; }
      else {
        // Fallback 2: gleiche numerische Endung, anderes Präfix
        // (ch:1:SchedStopPoint:7000 -> ch:1:StopPlace:7000)
        const s = numericSuffix(id);
        const suffixMatch = s ? stopsBySuffix[s] : null;
        if (suffixMatch) { lat = suffixMatch.lat; lon = suffixMatch.lon; }
      }
    }

    if (!stops[id]) {
      stops[id] = { id, name, lat, lon, alt:null, type:'ScheduledStopPoint' };
    } else {
      if (!stops[id].name || stops[id].name === stops[id].id) stops[id].name = name;
    }
  });

  return stops;
}

function parseLines(doc) {
  const lines = {};
  nx(doc, 'Line').forEach(l => {
    const id = l.getAttribute('id');
    const opRef = nxFirst(l,'OperatorRef');
    lines[id] = {
      id,
      name:      txt(l,'Name')          || id,
      shortName: txt(l,'ShortName')     || null,
      mode:      txt(l,'TransportMode') || null,
      operator:  opRef ? opRef.getAttribute('ref') : null,
    };
  });
  return lines;
}

function parseJourneys(doc, stops) {
  // StopPointInJourneyPattern -> SSP-ref + order
  // order fallback: use document sequence index when order attribute missing
  const spijpMap = {}, spijpOrder = {};
  nx(doc,'StopPointInJourneyPattern').forEach((sp, seqIdx) => {
    const id    = sp.getAttribute('id');
    const order = sp.hasAttribute('order')
      ? parseInt(sp.getAttribute('order'), 10)
      : seqIdx + 1;
    const ref   = nxFirst(sp,'ScheduledStopPointRef');
    if (ref) { spijpMap[id] = ref.getAttribute('ref'); spijpOrder[id] = order; }
  });

  return nx(doc,'ServiceJourney').map(sj => {
    const id      = sj.getAttribute('id');
    const lineRef = nxFirst(sj,'LineRef');

    const pts = nx(sj,'TimetabledPassingTime').map((pt, seqIdx) => {
      // namespace-aware search, then localName fallback
      let refEl = nxFirst(pt,'PointInJourneyPatternRef')
               || nxFirst(pt,'StopPointInJourneyPatternRef');
      if (!refEl) {
        for (const child of pt.children) {
          const ln = child.localName;
          if (ln === 'PointInJourneyPatternRef' || ln === 'StopPointInJourneyPatternRef') {
            refEl = child; break;
          }
        }
      }
      let stopRef  = '', order = seqIdx + 1;
      if (refEl) {
        const spRef = refEl.getAttribute('ref');
        stopRef = spijpMap[spRef] || spRef;
        order   = spijpOrder[spRef] || seqIdx + 1;
      }
      const stop = stops[stopRef] || {};
      return {
        stopRef,
        stopName:  stop.name || stopRef,
        lat:       stop.lat  || null,
        lon:       stop.lon  || null,
        arrival:   txt(pt,'ArrivalTime'),
        departure: txt(pt,'DepartureTime'),
        order,
      };
    });

    pts.sort((a,b) => a.order - b.order);
    return {
      id,
      name:     txt(sj,'Name'),
      lineRef:  lineRef ? lineRef.getAttribute('ref') : null,
      passingTimes: pts,
    };
  });
}

// ════════════════════════════════════════════════════════
//  Datenqualitäts-Prüfung (über XSD hinaus)
// ════════════════════════════════════════════════════════

// Haversine-Distanz in km
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function timeToMinutes(t) {
  if (!t) return null;
  const [h,m,s] = t.split(':').map(Number);
  return h*60 + m + (s||0)/60;
}

// Plausible Höchstgeschwindigkeit pro Modus (km/h)
const MAX_SPEED = { rail:300, train:300, bus:120, tram:80, metro:100, water:80, default:300 };

function runQualityChecks(data) {
  const { stops, lines, journeys } = data;
  const issues = [];   // {level:'err'|'warn'|'info', cat, msg, ctx}
  const passed = [];   // text strings

  // Schweiz-Bounding-Box (grosszügig inkl. Grenzregionen)
  const CH = { latMin:45.5, latMax:48.0, lonMin:5.5, lonMax:11.0 };

  // ── 1. Haltestellen ohne Koordinaten ──
  const noCoord = Object.values(stops).filter(s => !s.lat || !s.lon);
  if (noCoord.length) {
    noCoord.forEach(s => issues.push({
      level:'warn', cat:'Koordinaten',
      msg:`Haltestelle ohne Koordinaten: ${s.name}`,
      ctx:s.id,
    }));
  } else {
    passed.push('Alle Haltestellen haben Koordinaten');
  }

  // ── 2. Koordinaten ausserhalb Schweiz ──
  let outsideCH = 0;
  Object.values(stops).forEach(s => {
    if (s.lat && s.lon) {
      if (s.lat < CH.latMin || s.lat > CH.latMax || s.lon < CH.lonMin || s.lon > CH.lonMax) {
        issues.push({
          level:'warn', cat:'Geografie',
          msg:`Koordinaten ausserhalb CH-Region: ${s.name}`,
          ctx:`${s.lat.toFixed(5)}, ${s.lon.toFixed(5)} — ${s.id}`,
        });
        outsideCH++;
      }
    }
  });
  if (!outsideCH && Object.values(stops).some(s=>s.lat)) {
    passed.push('Alle Koordinaten innerhalb der CH-Region');
  }

  // ── 3. Pro Fahrt: Geschwindigkeit & Zeit-Monotonie ──
  let speedOK = true, timeOK = true;
  journeys.forEach(j => {
    const line = j.lineRef ? lines[j.lineRef] : null;
    const mode = (line?.mode || 'default').toLowerCase();
    const maxSpeed = MAX_SPEED[mode] || MAX_SPEED.default;
    const pts = j.passingTimes;
    const jName = j.name || j.id;

    let lastTime = null;
    for (let i=0; i<pts.length; i++) {
      const p = pts[i];
      const t = timeToMinutes(p.arrival || p.departure);

      // Zeit-Monotonie
      if (t !== null && lastTime !== null && t < lastTime) {
        issues.push({
          level:'err', cat:'Zeitfolge',
          msg:`Zeit läuft rückwärts bei ${p.stopName} (Fahrt ${jName})`,
          ctx:`${formatMin(lastTime)} → ${formatMin(t)}`,
        });
        timeOK = false;
      }
      if (t !== null) lastTime = Math.max(lastTime ?? t, t);

      // Geschwindigkeit zum Vorgänger
      if (i > 0) {
        const prev = pts[i-1];
        if (prev.lat && prev.lon && p.lat && p.lon) {
          const dist = haversineKm(prev.lat, prev.lon, p.lat, p.lon);
          const tPrev = timeToMinutes(prev.departure || prev.arrival);
          const tCur  = timeToMinutes(p.arrival || p.departure);
          if (tPrev !== null && tCur !== null && tCur > tPrev) {
            const hours = (tCur - tPrev) / 60;
            const speed = dist / hours;
            if (speed > maxSpeed) {
              issues.push({
                level:'err', cat:'Geschwindigkeit',
                msg:`Unplausible Geschwindigkeit ${prev.stopName} → ${p.stopName}: ${Math.round(speed)} km/h (max ${maxSpeed} für ${mode})`,
                ctx:`${dist.toFixed(1)} km in ${Math.round((tCur-tPrev))} min — Fahrt ${jName}`,
              });
              speedOK = false;
            }
          }
        }
      }
    }
  });
  if (speedOK && journeys.length) passed.push('Alle Segment-Geschwindigkeiten plausibel');
  if (timeOK  && journeys.length) passed.push('Alle Fahrzeiten monoton steigend');

  // ── 3b. Umweg-Check: erkennt falsch platzierte Koordinaten ──
  // Wenn eine Haltestelle einen grossen geografischen Umweg verursacht,
  // ist ihre Koordinate vermutlich falsch (Winterthur-Fall).
  let detourOK = true;
  journeys.forEach(j => {
    const pts = j.passingTimes.filter(p => p.lat && p.lon);
    for (let i=1; i<pts.length-1; i++) {
      const prev = pts[i-1], cur = pts[i], next = pts[i+1];
      const viaCur = haversineKm(prev.lat,prev.lon,cur.lat,cur.lon)
                   + haversineKm(cur.lat,cur.lon,next.lat,next.lon);
      const direct = haversineKm(prev.lat,prev.lon,next.lat,next.lon);
      if (direct > 1) {
        const detour = viaCur / direct;
        if (detour > 2.5) {
          issues.push({
            level:'warn', cat:'Geografie',
            msg:`Grosser Umweg über ${cur.stopName} — Koordinate evtl. falsch`,
            ctx:`Umweg-Faktor ${detour.toFixed(1)}× (${viaCur.toFixed(0)} km statt ${direct.toFixed(0)} km direkt) — ${cur.stopRef}`,
          });
          detourOK = false;
        }
      }
    }
  });
  if (detourOK && journeys.length) passed.push('Keine geografischen Ausreisser in den Routen');

  // ── 4. Referenz-Integrität: jede StopRef muss auf bekannten Stop zeigen ──
  let refOK = true;
  journeys.forEach(j => {
    j.passingTimes.forEach(p => {
      if (p.stopRef && !stops[p.stopRef]) {
        issues.push({
          level:'err', cat:'Referenzen',
          msg:`PassingTime verweist auf unbekannte Haltestelle`,
          ctx:`${p.stopRef} — Fahrt ${j.name||j.id}`,
        });
        refOK = false;
      }
    });
    if (j.lineRef && !lines[j.lineRef]) {
      issues.push({
        level:'warn', cat:'Referenzen',
        msg:`Fahrt verweist auf unbekannte Linie`,
        ctx:`${j.lineRef} — Fahrt ${j.name||j.id}`,
      });
      refOK = false;
    }
  });
  if (refOK && journeys.length) passed.push('Alle Referenzen konsistent mit deklarierten IDs');

  // ── 5. Fahrten ohne Zeitangaben ──
  journeys.forEach(j => {
    const withTime = j.passingTimes.filter(p => p.arrival || p.departure).length;
    if (withTime === 0) {
      issues.push({
        level:'warn', cat:'Zeiten',
        msg:`Fahrt ohne jegliche Zeitangaben: ${j.name||j.id}`,
        ctx:`${j.passingTimes.length} Haltepunkte, 0 mit Zeit`,
      });
    }
  });

  // ── 6. Duplikate: zwei Stops mit identischen Koordinaten ──
  const coordMap = {};
  Object.values(stops).forEach(s => {
    if (s.lat && s.lon) {
      const key = s.lat.toFixed(5)+','+s.lon.toFixed(5);
      (coordMap[key] = coordMap[key] || []).push(s);
    }
  });
  Object.values(coordMap).forEach(group => {
    if (group.length > 1) {
      issues.push({
        level:'info', cat:'Duplikate',
        msg:`${group.length} Haltestellen mit identischen Koordinaten`,
        ctx:group.map(s=>s.name).join(', '),
      });
    }
  });

  return { issues, passed };
}

function formatMin(m) {
  const h = Math.floor(m/60), mm = Math.round(m%60);
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}


let parsedData = null, activeJourney = null;
let lineLayer, stopLayer, tileLayers = {};

const map = L.map('map').setView([46.8, 8.2], 8);

// Two tile layers: light + dark
tileLayers.light = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { attribution:'© OpenStreetMap, © CARTO', subdomains:'abcd', maxZoom:19 }
).addTo(map);

tileLayers.dark = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { attribution:'© OpenStreetMap, © CARTO', subdomains:'abcd', maxZoom:19 }
);

lineLayer = L.layerGroup().addTo(map);
stopLayer = L.layerGroup().addTo(map);

function updateMapTiles() {
  if (darkMode) {
    tileLayers.light.remove();
    tileLayers.dark.addTo(map);
  } else {
    tileLayers.dark.remove();
    tileLayers.light.addTo(map);
  }
}

// ════════════════════════════════════════════════════════
//  File loading
// ════════════════════════════════════════════════════════
async function loadSample(path) {
  if (!path) return;
  setStatus('Lädt…');
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    processXML(await res.text(), path.split('/').pop());
  } catch(e) { setStatus('Fehler: ' + e.message, true); }
}

function loadLocalFile(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  setStatus('Liest Datei…');
  const r = new FileReader();
  r.onload  = e => processXML(e.target.result, file.name);
  r.onerror = () => setStatus('Lesefehler', true);
  r.readAsText(file, 'UTF-8');
  input.value = '';
}

function processXML(xml, filename) {
  try {
    parsedData = parseNeTEx(xml);
    renderAll(filename);
    validateXML(xml, filename);
    setStatus(filename + ' — ' + parsedData.journeys.length + ' Fahrten');
  } catch(e) {
    setStatus('Parse-Fehler: ' + e.message, true);
    console.error(e);
  }
}

//  Render
// ════════════════════════════════════════════════════════
function renderAll(filename) {
  const { stops, lines, journeys } = parsedData;
  document.getElementById('s-stops').textContent    = Object.keys(stops).length;
  document.getElementById('s-lines').textContent    = Object.keys(lines).length;
  document.getElementById('s-journeys').textContent = journeys.length;
  renderJourneyList(journeys, lines);
  renderMap(stops, journeys);
  renderMarey(stops, journeys);
  renderQuality(parsedData);
  if (journeys.length) selectJourney(0);
}

// ── Sidebar ──────────────────────────────────────────────
function modeClass(m) {
  if (!m) return 'm-other';
  m = m.toLowerCase();
  return m.includes('rail')||m.includes('train') ? 'm-rail' : m.includes('bus') ? 'm-bus' : 'm-other';
}
function modeLabel(m) {
  if (!m) return 'ÖV';
  m = m.toLowerCase();
  return m.includes('rail')||m.includes('train') ? 'RAIL' : m.includes('bus') ? 'BUS' : m.slice(0,4).toUpperCase();
}

function renderJourneyList(journeys, lines) {
  const el = document.getElementById('journey-list');
  if (!journeys.length) { el.innerHTML = '<div class="empty" style="padding:24px 0">Keine Fahrten</div>'; return; }
  el.innerHTML = journeys.map((j,i) => {
    const line = j.lineRef ? lines[j.lineRef] : null;
    const pts  = j.passingTimes;
    const from = pts[0]?.stopName || '?';
    const to   = pts[pts.length-1]?.stopName || '?';
    const dep  = pts[0]?.departure || pts[0]?.arrival || '';
    return `<div class="ji" id="ji-${i}" onclick="selectJourney(${i})">
      <div class="ji-name"><span class="mode-pill ${modeClass(line?.mode)}">${modeLabel(line?.mode)}</span>${j.name||j.id}</div>
      <div class="ji-meta">${from} → ${to}${dep?' | ab '+dep:''}</div>
    </div>`;
  }).join('');
}

function selectJourney(i) {
  document.querySelectorAll('.ji').forEach(e=>e.classList.remove('active'));
  document.getElementById('ji-'+i)?.classList.add('active');
  activeJourney = parsedData.journeys[i];
  highlightJourney(activeJourney);
  renderDetail(activeJourney);
}

// ── Map ──────────────────────────────────────────────────
// Journey colours — one per journey index
const JOURNEY_COLORS = ['#1976d2','#e53935','#388e3c','#f57c00','#7b1fa2','#00838f','#5d4037'];

function renderMap(stops, journeys) {
  lineLayer.clearLayers();
  stopLayer.clearLayers();

  // Draw all journeys as polylines
  journeys.forEach((j, ji) => {
    const coords = j.passingTimes
      .filter(p => p.lat && p.lon)
      .map(p => [p.lat, p.lon]);
    if (coords.length > 1) {
      L.polyline(coords, {
        color:   JOURNEY_COLORS[ji % JOURNEY_COLORS.length],
        weight:  4,
        opacity: 0.75,
      }).bindTooltip(j.name || j.id, {sticky:true}).addTo(lineLayer);
    }
  });

  // Draw stops — deduplicated by lat/lon
  const bounds = [];
  const drawn  = new Set();
  Object.values(stops).forEach(s => {
    if (!s.lat || !s.lon) return;
    const key = s.lat.toFixed(5) + ',' + s.lon.toFixed(5);
    if (drawn.has(key)) return;
    drawn.add(key);
    bounds.push([s.lat, s.lon]);
    L.circleMarker([s.lat, s.lon], {
      radius:8, fillColor:'#fff', color:'#1976d2',
      weight:2.5, fillOpacity:1,
    }).bindPopup(`<b>${s.name}</b><br><span style="font-family:monospace;font-size:11px">${s.id}</span>`)
      .addTo(stopLayer);
  });

  if (bounds.length) map.fitBounds(bounds, {padding:[40,40]});
}

function highlightJourney(j) {
  lineLayer.clearLayers();
  parsedData.journeys.forEach((jj, ji) => {
    const coords = jj.passingTimes.filter(p=>p.lat&&p.lon).map(p=>[p.lat,p.lon]);
    if (coords.length < 2) return;
    const active = jj === j;
    L.polyline(coords, {
      color:   active ? '#e53935' : JOURNEY_COLORS[ji % JOURNEY_COLORS.length],
      weight:  active ? 6 : 3,
      opacity: active ? 1 : 0.3,
    }).bindTooltip(jj.name||jj.id, {sticky:true}).addTo(lineLayer);
  });
}

// ── Marey ────────────────────────────────────────────────
function timeToMin(t) {
  if (!t) return null;
  const [h,m,s] = t.split(':').map(Number);
  return h*60 + m + (s||0)/60;
}

function renderMarey(stops, journeys) {
  const container = document.getElementById('marey-container');
  const orderedStops = [];
  const seen = new Set();
  journeys.forEach(j => j.passingTimes.forEach(pt => {
    if (!seen.has(pt.stopRef)) { seen.add(pt.stopRef); orderedStops.push({id:pt.stopRef, name:pt.stopName}); }
  }));

  const allTimes = journeys.flatMap(j => j.passingTimes.flatMap(p =>
    [p.arrival,p.departure].map(timeToMin).filter(t=>t!==null)
  ));

  if (!orderedStops.length || !allTimes.length) {
    container.innerHTML = '<div class="empty" style="height:200px">Keine Zeitdaten verfügbar</div>';
    return;
  }

  const tMin  = Math.floor(Math.min(...allTimes)/30)*30;
  const tMax  = Math.ceil( Math.max(...allTimes)/30)*30;
  const margin = {top:44, right:70, bottom:20, left:175};
  const rowH   = 36;
  const colW   = Math.max(70, Math.floor((Math.min(window.innerWidth-290,900)-margin.left-margin.right)/journeys.length));
  const svgW   = margin.left + journeys.length*colW + margin.right;
  const svgH   = margin.top  + orderedStops.length*rowH + margin.bottom;
  const stopIdx = Object.fromEntries(orderedStops.map((s,i)=>[s.id,i]));
  const yOf = t => margin.top + ((t-tMin)/(tMax-tMin)) * orderedStops.length*rowH;

  const isDark = darkMode;
  const rowEven  = isDark ? 'rgba(26,29,39,.9)'  : 'rgba(240,242,250,.9)';
  const rowOdd   = isDark ? 'rgba(34,38,58,.9)'  : 'rgba(255,255,255,.9)';
  const labelCol = isDark ? '#7986cb' : '#5c6380';
  const gridCol  = isDark ? 'rgba(45,50,80,.8)'  : 'rgba(180,185,210,.6)';
  const timeCol  = isDark ? '#4a5568' : '#9aa0bc';
  const dotFill  = isDark ? '#42a5f5' : '#1976d2';
  const dotStroke= isDark ? '#0f1117' : '#ffffff';

  const svg = d3.create('svg').attr('width',svgW).attr('height',svgH);

  orderedStops.forEach((s,i) => {
    svg.append('rect')
      .attr('x',margin.left).attr('y',margin.top+i*rowH)
      .attr('width',svgW-margin.left-margin.right).attr('height',rowH)
      .attr('fill', i%2===0?rowEven:rowOdd);
    const label = s.name.length>24 ? s.name.slice(0,22)+'…' : s.name;
    svg.append('text')
      .attr('x',margin.left-8).attr('y',margin.top+i*rowH+rowH/2)
      .attr('text-anchor','end').attr('dominant-baseline','central')
      .attr('fill',labelCol).attr('font-size',12).attr('font-family','system-ui,sans-serif')
      .text(label);
  });

  for (let t=tMin; t<=tMax; t+=30) {
    const y = yOf(t);
    svg.append('line').attr('x1',margin.left).attr('x2',svgW-margin.right).attr('y1',y).attr('y2',y)
      .attr('stroke',gridCol).attr('stroke-width',.5);
    const h=Math.floor(t/60), m=t%60;
    svg.append('text').attr('x',svgW-margin.right+4).attr('y',y)
      .attr('dominant-baseline','central').attr('fill',timeCol).attr('font-size',10).attr('font-family','monospace')
      .text(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  }

  journeys.forEach((j,ji) => {
    const x     = margin.left + ji*colW + colW/2;
    const color = JOURNEY_COLORS[ji % JOURNEY_COLORS.length];
    const label = (j.name||j.id).slice(0,10);
    svg.append('text').attr('x',x).attr('y',margin.top-10)
      .attr('text-anchor','middle').attr('fill',color)
      .attr('font-size',11).attr('font-weight','600').attr('font-family','system-ui,sans-serif')
      .text(label);

    const pts = j.passingTimes.map(pt => {
      const si = stopIdx[pt.stopRef];
      if (si===undefined) return null;
      const t = timeToMin(pt.departure||pt.arrival);
      if (t===null) return null;
      return {x, y:margin.top+si*rowH+rowH/2, time:pt.departure||pt.arrival};
    }).filter(Boolean);

    if (pts.length>1)
      svg.append('path').datum(pts).attr('d',d3.line().x(d=>d.x).y(d=>d.y))
        .attr('fill','none').attr('stroke',color).attr('stroke-width',2).attr('opacity',.9);

    pts.forEach(p => {
      svg.append('circle').attr('cx',p.x).attr('cy',p.y).attr('r',5)
        .attr('fill',dotFill).attr('stroke',dotStroke).attr('stroke-width',1.5)
        .append('title').text(p.time);
    });
  });

  container.innerHTML = '';
  container.appendChild(svg.node());
}

// ── Detail ───────────────────────────────────────────────
function renderDetail(j) {
  const el = document.getElementById('tab-detail');
  if (!j) { el.innerHTML='<div class="empty">Fahrt wählen</div>'; return; }
  const line = j.lineRef ? parsedData.lines[j.lineRef] : null;
  const rows = j.passingTimes.map((pt,i) => `
    <tr><td>${i+1}</td><td>${pt.stopName}</td>
    <td class="mono">${pt.arrival||'—'}</td>
    <td class="mono">${pt.departure||'—'}</td>
    <td class="mono" style="font-size:11px;color:var(--muted)">${pt.stopRef}</td></tr>`).join('');
  el.innerHTML = `
    <div class="sh">Fahrt</div>
    <div class="stat-row"><span class="stat-label">ID</span><span class="mono" style="font-size:12px">${j.id}</span></div>
    <div class="stat-row"><span class="stat-label">Name</span><span>${j.name||'—'}</span></div>
    <div class="stat-row"><span class="stat-label">Linie</span><span>${line?.name||j.lineRef||'—'}</span></div>
    <div class="stat-row"><span class="stat-label">Modus</span><span>${line?.mode||'—'}</span></div>
    <div class="sh" style="margin-top:18px">Passierungszeiten</div>
    <table class="detail-table">
      <thead><tr><th>#</th><th>Haltestelle</th><th>Ankunft</th><th>Abfahrt</th><th>Stop-Ref</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Quality panel render ─────────────────────────────────
function renderQuality(data) {
  const { issues, passed } = runQualityChecks(data);
  const el = document.getElementById('tab-quality');

  const errs  = issues.filter(i => i.level === 'err');
  const warns = issues.filter(i => i.level === 'warn');
  const infos = issues.filter(i => i.level === 'info');

  // Tab badge
  const badge = document.getElementById('qa-tab-badge');
  if (errs.length) { badge.className = 'qa-tab-badge err';  badge.textContent = errs.length; }
  else if (warns.length) { badge.className = 'qa-tab-badge warn'; badge.textContent = warns.length; }
  else { badge.className = 'qa-tab-badge ok'; badge.textContent = '✓'; }

  // Summary cards
  const cards = `
    <div class="qa-summary">
      <div class="qa-card ${errs.length?'err':'ok'}">
        <div class="qa-card-num">${errs.length}</div>
        <div class="qa-card-label">Fehler</div>
      </div>
      <div class="qa-card ${warns.length?'warn':'ok'}">
        <div class="qa-card-num">${warns.length}</div>
        <div class="qa-card-label">Warnungen</div>
      </div>
      <div class="qa-card">
        <div class="qa-card-num" style="color:var(--muted)">${infos.length}</div>
        <div class="qa-card-label">Hinweise</div>
      </div>
      <div class="qa-card ok">
        <div class="qa-card-num">${passed.length}</div>
        <div class="qa-card-label">Bestanden</div>
      </div>
    </div>`;

  const iconFor = l => l==='err'?'❌':l==='warn'?'⚠️':'ℹ️';
  const renderItems = arr => arr.map(i => `
    <div class="qa-item ${i.level}">
      <span class="qa-icon">${iconFor(i.level)}</span>
      <div class="qa-body">
        <div class="qa-msg"><b>${i.cat}:</b> ${escHtml(i.msg)}</div>
        ${i.ctx ? `<div class="qa-ctx">${escHtml(i.ctx)}</div>` : ''}
      </div>
    </div>`).join('');

  let body = cards;

  if (issues.length === 0) {
    body += `<div class="sh">Plausibilitätsprüfung</div>`;
  } else {
    body += `<div class="sh">Gefundene Probleme</div>`;
    if (errs.length)  body += renderItems(errs);
    if (warns.length) body += renderItems(warns);
    if (infos.length) body += renderItems(infos);
    body += `<div class="sh" style="margin-top:18px">Bestandene Prüfungen</div>`;
  }

  body += passed.map(p => `
    <div class="qa-check-ok"><span class="qa-icon">✅</span>${escHtml(p)}</div>`).join('');

  body += `<div class="qa-ctx" style="margin-top:16px;padding:0 2px">
    Diese Prüfungen gehen über die XSD-Validierung hinaus und testen inhaltliche Plausibilität
    (Geschwindigkeiten, Zeitfolgen, Referenz-Integrität, Geografie).
  </div>`;

  el.innerHTML = body;
}

function showTab(name) {
  ['map','marey','detail','quality'].forEach((t,i) => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==name);
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===name);
  });
  if (name==='map') setTimeout(()=>map.invalidateSize(),50);
}

// ════════════════════════════════════════════════════════
//  Drag & Drop
// ════════════════════════════════════════════════════════
const dropOverlay = document.getElementById('drop-overlay');
document.addEventListener('dragover',  e=>{e.preventDefault();dropOverlay.classList.add('active');});
document.addEventListener('dragleave', e=>{if(!e.relatedTarget)dropOverlay.classList.remove('active');});
document.addEventListener('drop', e=>{
  e.preventDefault(); dropOverlay.classList.remove('active');
  const f=e.dataTransfer.files[0];
  if(f?.name.endsWith('.xml')){const r=new FileReader();r.onload=ev=>processXML(ev.target.result,f.name);r.readAsText(f,'UTF-8');}
});

// ════════════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════════════
function setStatus(msg, err=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = err ? 'var(--red)' : 'var(--muted)';
}
// ════════════════════════════════════════════════════════
//  XSD Validation
// ════════════════════════════════════════════════════════
const VALIDATOR_URL = 'https://netex-validator.onrender.com/validate';
let lastValidationResult = null;

async function validateXML(xmlContent, filename) {
  const badge = document.getElementById('val-badge');
  const icon  = document.getElementById('val-icon');
  const text  = document.getElementById('val-text');

  badge.className = 'val-badge loading show';
  icon.textContent = '⏳'; text.textContent = 'Validiere…';

  try {
    const blob = new Blob([xmlContent], {type:'application/xml'});
    const form = new FormData();
    form.append('file', blob, filename);

    const res = await fetch(VALIDATOR_URL, {method:'POST', body:form});
    if (!res.ok) throw new Error('Validator nicht erreichbar (HTTP ' + res.status + ')');
    const data = await res.json();
    lastValidationResult = data;

    if (data.valid) {
      badge.className = 'val-badge valid show';
      icon.textContent = '✅'; text.textContent = 'XSD gültig';
    } else {
      badge.className = 'val-badge invalid show';
      icon.textContent = '❌';
      text.textContent = 'XSD — ' + data.error_count + ' Fehler — Details anzeigen';
    }
  } catch(e) {
    badge.className = 'val-badge invalid show';
    document.getElementById('val-icon').textContent = '⚠️';
    document.getElementById('val-text').textContent = 'XSD — Validator nicht erreichbar';
    lastValidationResult = {valid:false, errors:[{message:e.message, level:'error'}]};
  }
}

function showValidationModal() {
  if (!lastValidationResult) return;
  const r = lastValidationResult;
  const modal = document.getElementById('val-modal');
  const body  = document.getElementById('modal-body');
  document.getElementById('modal-title').textContent =
    'XSD-Validierung — ' + (r.filename || '');

  if (r.valid) {
    body.innerHTML = `<div class="val-summary ok">✅ Datei ist gültig gegen NeTEx 2.0 XSD${r.duration_ms ? ' (' + r.duration_ms + ' ms)' : ''}</div>`;
  } else {
    const rows = (r.errors||[]).map(e => `
      <div class="err-row">
        <div class="err-loc">Zeile ${e.line||'?'}${e.col ? ', Spalte '+e.col : ''} — ${e.level||'error'}</div>
        <div class="err-msg">${escHtml(e.message)}</div>
      </div>`).join('');
    body.innerHTML = `
      <div class="val-summary err">❌ ${r.error_count||r.errors?.length||'?'} Fehler gefunden${r.duration_ms ? ' (' + r.duration_ms + ' ms)' : ''}</div>
      ${rows}`;
  }
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('val-modal').classList.remove('show');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

</script>
